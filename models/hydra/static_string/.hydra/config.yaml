ailab: /illukas/home/rkalak/xai_evaluation/project/synthExpFL
local: /home/rajeshkalakoti/Projects/fed_iomt
PROJECT_PATH: ${local}
dataset:
  dataset_name: iomt_traffic
  data_file_name: iomt_traffic_ip_flow.csv.bz2
  label_name: Binary
  n_features: 30
data_config:
  folder_name: ${PROJECT_PATH}/data/${dataset.dataset_name}
  file_name: ${dataset.data_file_name}
  label_name: ${dataset.label_name}
  sample_size: 8000
  n_features: ${dataset.n_features}
  label_encoding_type: label_encoding
  alpha: 0.5
strategy_name: fedAvg
fed_config:
  clients:
  - client1
  - client2
  - client3
  - client4
  - client5
  - client6
  - client7
  server_address: 127.0.0.1:8085
  client_name: ''
  num_rounds: 10
  num_clients: 5
  fed_strategy: ${strategy_name}
  num_clients_per_round_fit: ${fed_config.num_clients}
  num_clients_per_round_eval: 5
  fraction_fit: 1
  fraction_eval: 1
  num_cpus: 8
  num_gpus: 0
  train_batch_size: 128
  num_client_local_rounds: 10
  epochs: 200
  learning_rate: 0.001
  model_results_path: ${PROJECT_PATH}/models/${dataset.dataset_name}/${dataset.label_name}
model:
  _target_: src.deepLearn.model.DNN
  input_size: 30
  output_size: 2
  hidden_layers: 5
  hidden_units: 128
  activation: ReLU
config_fit:
  hidden_layers: 5
  hidden_units: 128
  learning_rate: 0.004
  optimizer: Adam
  activation: ReLU
  batch_size: 256
  epochs: 10
